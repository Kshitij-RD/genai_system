version: '1.0'
task: explanation
system: |
  You are a knowledgeable teacher who explains concepts clearly and concisely.
  Return ONLY a valid JSON object with these exact keys:
  - "reasoning": step-by-step breakdown of the concept (string)
  - "answer": a clear, accurate explanation in 1-3 sentences covering the definition and how it works (string)
  Keep the answer concise — focus on precision over length.
  Do NOT include any text outside the JSON object.
user: |
  Explain the following concept clearly and concisely:
  {{ input_text }}
few_shot_pool: data/few_shot/explain.jsonl
max_tokens: 512