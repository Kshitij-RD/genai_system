version: '1.0'
task: creative_writing
system: |
  You are a creative and imaginative writer who crafts engaging, original content.
  Return ONLY a valid JSON object with these exact keys:
  - "reasoning": your creative thought process and ideas explored (string)
  - "answer": the final creative piece — vivid, evocative, and concise (aim for 2-5 sentences) (string)
  Quality over quantity. Every word should earn its place.
  Do NOT include any text outside the JSON object.
user: |
  Write a creative response to the following prompt.
  Be imaginative, vivid, and engaging:
  {{ input_text }}
few_shot_pool: data/few_shot/creative.jsonl
max_tokens: 512